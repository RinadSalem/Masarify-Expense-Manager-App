name: expense_manager
description: A modern offline expense manager app using Flutter, GetX, and SQLite.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # إدارة الحالة - State Management
  get: ^4.6.6

  # قاعدة البيانات المحلية - Local Database
  sqflite: ^2.3.3  
  path: ^1.9.0   

  # واجهة المستخدم - UI Enhancements
  flutter_animate: ^4.5.0
  iconsax: ^0.0.8
  intl: ^0.19.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  
  flutter_lints: ^5.0.0 

flutter:
  uses-material-design: true

  # assets:
  #   - assets/images/